<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>选中计字 设置</title>
<style>
body { font-family: -apple-system, sans-serif; padding: 20px; background: #fafafa; color: #333; }
h2 { margin: 0 0 16px; font-weight: 500; }
label { display: block; margin-bottom: 8px; }
select { padding: 6px 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
.saved { color: #2e7d32; margin-top: 10px; display: none; }
</style>
</head>
<body>
<h2>选中计字 设置</h2>
<label>统计框语言：</label>
<select id="lang">
  <option value="zh">中文</option>
  <option value="en">English</option>
</select>
<p class="saved" id="saved">✓ 已保存</p>
<script src="options.js"></script>
</body>
</html>
